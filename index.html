<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Infinity and Beyond</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const fraseCompleta = "i love you infinity and beyond antonia";
        const palabras = fraseCompleta.split(" "); 
        const particles = [];

        function getHeartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
            };
        }

        for (let i = 0; i < 250; i++) {
            const t = Math.random() * Math.PI * 2;
            const point = getHeartPoint(t);
            particles.push({
                x: point.x,
                y: point.y,
                text: palabras[Math.floor(Math.random() * palabras.length)],
                size: Math.random() * 8 + 8,
                offset: Math.random() * Math.PI * 2
            });
        }

        let scale = 1;
        let growing = true;

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (growing) {
                scale += 0.002;
                if (scale > 1.08) growing = false;
            } else {
                scale -= 0.002;
                if (scale < 0.92) growing = true;
            }

            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);

            // --- TEXTO CENTRAL (MÁS PEQUEÑO) ---
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff2d75";
            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "center";
            
            // He bajado el tamaño de 22 a 14 para que sea sutil
            ctx.font = `bold ${14 * scale}px Courier New`; 
            ctx.fillText(fraseCompleta, 0, 0);
            
            ctx.font = `${20 * scale}px Arial`;
            ctx.fillText("∞", 0, 25); // Bajé también el infinito para que no choque

            // --- PARTÍCULAS ---
            ctx.scale(scale * 17, scale * 17);

            particles.forEach((p, index) => {
                ctx.font = `${p.size / 18}px Courier New`;
                ctx.fillStyle = `rgb(255, ${100 + (index % 100)}, 160)`;
                ctx.shadowBlur = 5;
                
                const move = Math.sin(Date.now() * 0.002 + p.offset) * 0.4;
                ctx.fillText(p.text, p.x + move, p.y + move);
            });

            ctx.restore();
            requestAnimationFrame(animate);
        }

        animate();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
